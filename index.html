<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Segurança</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, #fff9c4 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px; /* Aumentei um pouco o padding interno */
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-sizing: border-box; /* Garante que o padding não aumente o tamanho total */
        }

        .status-check {
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1em;
        }

        /* Simulação do Captcha */
        .captcha-box {
            background: #f9f9f9;
            border: 1px solid #d3d3d3;
            border-radius: 3px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 auto 25px auto; /* Centralizado e com margem inferior */
            cursor: pointer;
            max-width: 350px; /* Largura máxima para o captcha */
        }

        .captcha-box:hover { background: #f0f0f0; }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #c1c1c1;
            border-radius: 2px;
            background: white;
            transition: background 0.2s;
        }

        /* Botão Corrigido e Regulado */
        .btn-access {
            background: #ffcc00;
            color: #333;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%; /* Ocupa 100% do espaço disponível... */
            max-width: 350px; /* ...mas não passa desse tamanho, alinhando com o captcha */
            margin: 0 auto; /* Centraliza o botão */
            transition: transform 0.2s, background 0.3s;
            text-decoration: none;
            display: block; /* Garante que as margens funcionem */
            box-sizing: border-box;
        }

        .btn-access:hover {
            background: #ffb300;
            transform: scale(1.02);
        }

        .footer-text {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status-check">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        Verificação de carregamento concluída
    </div>

    <div class="captcha-box" onclick="document.getElementById('check').innerHTML = '✅'; document.getElementById('check').style.background = 'transparent'; document.getElementById('check').style.border = 'none';">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="check" class="checkbox"></div>
            <span>Sou humano</span>
        </div>
        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" width="30" alt="reCAPTCHA">
    </div>

    <a href="https://reliable-crumble-ddd534.netlify.app/" class="btn-access">
        ACESSAR AGORA
    </a>

    <p class="footer-text">Conexão segura via criptografia de ponta a ponta.</p>
</div>

</body>
</html>
